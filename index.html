<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>JellyHub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; min-height: 100vh; }
        :root { --orange: #ff9000; --dark: #000; --card: #1a1a1a; --border: #333; --mono: 'SF Mono', 'Fira Code', monospace; }
        .safe-top { height: env(safe-area-inset-top, 20px); }
        .safe-bottom { height: max(env(safe-area-inset-bottom, 16px), 16px); }

        /* ===== ONBOARDING ===== */
        .onboarding { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; background: #000; }
        .onboarding .big-logo { font-size: 80px; margin-bottom: 16px; }
        .onboarding h1 { font-size: 42px; font-weight: 900; margin-bottom: 4px; }
        .onboarding h1 .hub { background: var(--orange); color: #000; padding: 2px 10px; border-radius: 6px; font-style: italic; }
        .onboarding .subtitle { font-size: 16px; color: #888; margin-bottom: 40px; line-height: 1.5; }
        .onboarding .setup-card { background: var(--card); border: 2px solid var(--orange); border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; text-align: left; }
        .onboarding .setup-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; color: var(--orange); }
        .onboarding .field { margin-bottom: 14px; }
        .onboarding .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
        .onboarding .field input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: #fff; font-family: var(--mono); font-size: 15px; outline: none; }
        .onboarding .field input:focus { border-color: var(--orange); }
        .onboarding .field .hint { font-size: 11px; color: #666; margin-top: 4px; }
        .onboarding .start-btn { width: 100%; background: var(--orange); color: #000; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: .15s; }
        .onboarding .start-btn:active { transform: scale(.97); opacity: .8; }

        /* ===== MAIN APP ===== */
        .app { display: none; background: #000; min-height: 100vh; }
        .header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 24px; font-weight: 900; }
        .header h1 .hub { background: var(--orange); color: #000; padding: 1px 8px; border-radius: 5px; font-style: italic; }
        .header .settings-btn { background: none; border: 2px solid #444; color: #fff; font-size: 18px; cursor: pointer; padding: 6px 10px; border-radius: 8px; transition: .15s; }
        .header .settings-btn:active { border-color: var(--orange); color: var(--orange); }
        .ip-switch { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 8px; }
        .ip-switch button { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: #fff; font-size: 12px; cursor: pointer; transition: .15s; }
        .ip-switch button.active { border-color: var(--orange); background: rgba(255,144,0,.15); }
        .ip-switch button .ip-label { font-weight: 700; display: block; margin-bottom: 2px; }
        .ip-switch button .ip-value { font-family: var(--mono); font-size: 11px; color: #888; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 20px; }
        .service-card { background: var(--card); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; cursor: pointer; transition: .15s; border-left: 4px solid transparent; }
        .service-card:active { transform: scale(.97); }
        .service-name { font-size: 14px; font-weight: 700; }
        .service-url { font-size: 12px; color: #666; font-family: var(--mono); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; flex-shrink: 0; margin-left: auto; }

        /* ===== SETTINGS MODAL ===== */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.85); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-overlay.show { display: block; }
        .modal { background: #111; border: 2px solid var(--orange); border-radius: 16px; max-width: 420px; margin: 20px auto; padding: 24px; }
        .modal h2 { font-size: 20px; font-weight: 900; margin-bottom: 20px; color: var(--orange); text-align: center; }
        .modal .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
        .modal .section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .modal .service-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; }
        .modal .service-row:last-child { border-bottom: none; }
        .modal .service-row .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
        .modal .service-row .toggle input { opacity: 0; width: 0; height: 0; }
        .modal .service-row .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 24px; transition: .2s; }
        .modal .service-row .toggle .slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
        .modal .service-row .toggle input:checked + .slider { background: var(--orange); }
        .modal .service-row .toggle input:checked + .slider:before { transform: translateX(20px); }
        .modal .service-row .srv-name { flex: 1; font-weight: 600; font-size: 14px; }
        .modal .service-row .port-input { width: 70px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; color: var(--orange); font-family: var(--mono); font-size: 13px; text-align: center; outline: none; }
        .modal .service-row .port-input:focus { border-color: var(--orange); }
        .modal .reset-btn { width: 100%; background: none; border: 2px solid #c0392b; color: #c0392b; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 24px; transition: .15s; }
        .modal .reset-btn:active { background: rgba(192,57,43,.15); }
        .modal .save-btn { width: 100%; background: var(--orange); color: #000; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 12px; transition: .15s; }
        .modal .save-btn:active { transform: scale(.97); opacity: .8; }

        .modal .ip-field { margin-bottom: 14px; }
        .modal .ip-field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
        .modal .ip-field input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: #fff; font-family: var(--mono); font-size: 14px; outline: none; }
        .modal .ip-field input:focus { border-color: var(--orange); }
    </style>
</head>
<body>
    <div class="safe-top"></div>

    <!-- ===== ONBOARDING SCREEN ===== -->
    <div class="onboarding" id="onboarding">
        <div class="big-logo">🎬</div>
        <h1>Jelly<span class="hub">Hub</span></h1>
        <div class="subtitle">Dein Zuhause. Immer im Griff.</div>
        <div class="setup-card">
            <h2>⚙️ Ersteinrichtung</h2>
            <div class="field">
                <label>🏠 Home IP (lokal)</label>
                <input type="text" id="setup-home-ip" placeholder="192.168.2.42" inputmode="decimal">
                <div class="hint">IP in deinem Heimnetzwerk</div>
            </div>
            <div class="field">
                <label>🌐 Öffentliche IP / Domain</label>
                <input type="text" id="setup-public-ip" placeholder="meine.duckdns.org" inputmode="url">
                <div class="hint">Von unterwegs erreichbar (DynDNS, feste IP, etc.)</div>
            </div>
            <button class="start-btn" onclick="finishSetup()">🚀 Los geht's!</button>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="app" id="app">
        <div class="header">
            <h1>🎬 Jelly<span class="hub">Hub</span></h1>
            <button class="settings-btn" onclick="openSettings()" title="Einstellungen">⚙️</button>
        </div>
        <div class="ip-switch">
            <button id="btn-home" onclick="switchIp('home')" class="active">
                <span class="ip-label">🏠 Home</span>
                <span class="ip-value" id="display-home-ip">192.168.2.42</span>
            </button>
            <button id="btn-public" onclick="switchIp('public')">
                <span class="ip-label">🌐 Unterwegs</span>
                <span class="ip-value" id="display-public-ip">meine.duckdns.org</span>
            </button>
        </div>
        <div class="grid" id="grid"></div>
        <div class="safe-bottom"></div>
    </div>

    <!-- ===== SETTINGS MODAL ===== -->
    <div class="modal-overlay" id="settings-overlay">
        <div class="modal" style="position:relative;">
            <button class="close-btn" onclick="closeSettings()">✕</button>
            <h2>⚙️ Einstellungen</h2>

            <div class="section-title">🌐 IP / Domain</div>
            <div class="ip-field">
                <label>🏠 Home IP</label>
                <input type="text" id="set-home-ip" placeholder="192.168.2.42" inputmode="decimal">
            </div>
            <div class="ip-field">
                <label>🌐 Öffentliche IP</label>
                <input type="text" id="set-public-ip" placeholder="meine.duckdns.org" inputmode="url">
            </div>

            <div class="section-title">🔧 Services</div>
            <div id="settings-services"></div>

            <button class="save-btn" onclick="saveSettings()">💾 Speichern</button>
            <button class="reset-btn" onclick="resetAll()">🗑️ Alles zurücksetzen</button>
        </div>
    </div>

    <script>
        // ===== DEFAULT SERVICES =====
        const defaultServices = [
            { id: 'ha',       name: 'HomeAssistant', port: 8123,  icon: '🏠', color: '#41bdf5', enabled: true },
            { id: 'adguard',  name: 'AdGuard',       port: 3000,  icon: '🛡️', color: '#67b279', enabled: true },
            { id: 'openwrt',  name: 'OpenWrt',       port: 80,    icon: '📡', color: '#00b5e2', enabled: true },
            { id: 'uptime',   name: 'UptimeKuma',    port: 3001,  icon: '📊', color: '#5cdd8b', enabled: true },
            { id: 'nextcloud',name: 'Nextcloud',     port: 443,   icon: '☁️', color: '#0082c9', enabled: true },
            { id: 'jellyhub', name: 'JellyHub',      port: 8096,  icon: '🎬', color: '#ff9000', enabled: true },
        ];

        let currentMode = 'home';

        // ===== CONFIG =====
        function getConfig() {
            return {
                homeIp: localStorage.getItem('hd-home-ip') || '',
                publicIp: localStorage.getItem('hd-public-ip') || '',
                setupDone: localStorage.getItem('hd-setup-done') === 'true',
                services: JSON.parse(localStorage.getItem('hd-services') || 'null') || defaultServices
            };
        }

        function saveConfig(cfg) {
            localStorage.setItem('hd-home-ip', cfg.homeIp);
            localStorage.setItem('hd-public-ip', cfg.publicIp);
            localStorage.setItem('hd-setup-done', 'true');
            localStorage.setItem('hd-services', JSON.stringify(cfg.services));
        }

        function getActiveIp() {
            const cfg = getConfig();
            return currentMode === 'home' ? cfg.homeIp : cfg.publicIp;
        }

        // ===== ONBOARDING =====
        function finishSetup() {
            const homeIp = document.getElementById('setup-home-ip').value.trim();
            const publicIp = document.getElementById('setup-public-ip').value.trim();
            if (!homeIp) { alert('Bitte Home IP eingeben!'); return; }
            const cfg = getConfig();
            cfg.homeIp = homeIp;
            cfg.publicIp = publicIp || homeIp;
            cfg.setupDone = true;
            saveConfig(cfg);
            showApp();
        }

        // ===== IP SWITCH =====
        function switchIp(mode) {
            currentMode = mode;
            document.getElementById('btn-home').className = mode === 'home' ? 'active' : '';
            document.getElementById('btn-public').className = mode === 'public' ? 'active' : '';
            renderCards();
        }

        // ===== CARDS =====
        function openService(s) {
            const ip = getActiveIp();
            const proto = s.port === 443 ? 'https' : 'http';
            window.open(`${proto}://${ip}:${s.port}`, '_blank');
        }

        function renderCards() {
            const cfg = getConfig();
            const ip = getActiveIp();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const enabledServices = cfg.services.filter(s => s.enabled !== false);
            enabledServices.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card';
                if (s.id === 'jellyhub') {
                    card.style.background = '#000';
                    card.style.border = '2px solid var(--orange)';
                    card.innerHTML = `
                        <div class="service-info">
                            <div class="service-name" style="color:var(--orange);font-weight:900;font-style:italic;">Jelly<span style="background:var(--orange);color:#000;padding:1px 6px;border-radius:4px;margin-left:2px;font-style:normal;">Hub</span></div>
                            <div class="service-url">${ip}:${s.port}</div>
                        </div>
                        <div class="status-dot"></div>`;
                } else {
                    card.style.borderLeftColor = s.color;
                    card.innerHTML = `
                        <div class="service-info">
                            <div class="service-name">${s.icon} ${s.name}</div>
                            <div class="service-url">${ip}:${s.port}</div>
                        </div>
                        <div class="status-dot"></div>`;
                }
                card.onclick = () => openService(s);
                grid.appendChild(card);
            });
        }

        // ===== SETTINGS =====
        function openSettings() {
            const cfg = getConfig();
            document.getElementById('set-home-ip').value = cfg.homeIp;
            document.getElementById('set-public-ip').value = cfg.publicIp;
            const container = document.getElementById('settings-services');
            container.innerHTML = '';
            cfg.services.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'service-row';
                row.innerHTML = `
                    <label class="toggle">
                        <input type="checkbox" data-idx="${i}" ${s.enabled !== false ? 'checked' : ''} onchange="toggleService(this)">
                        <span class="slider"></span>
                    </label>
                    <span class="srv-name">${s.icon} ${s.name}</span>
                    <input type="number" class="port-input" value="${s.port}" data-idx="${i}" onchange="updatePort(this)">`;
                container.appendChild(row);
            });
            document.getElementById('settings-overlay').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settings-overlay').classList.remove('show');
        }

        function toggleService(el) {
            const cfg = getConfig();
            const idx = parseInt(el.dataset.idx);
            cfg.services[idx].enabled = el.checked;
            saveConfig(cfg);
            renderCards();
        }

        function updatePort(el) {
            const cfg = getConfig();
            const idx = parseInt(el.dataset.idx);
            cfg.services[idx].port = parseInt(el.value) || 80;
            saveConfig(cfg);
            renderCards();
        }

        function saveSettings() {
            const cfg = getConfig();
            cfg.homeIp = document.getElementById('set-home-ip').value.trim();
            cfg.publicIp = document.getElementById('set-public-ip').value.trim() || cfg.homeIp;
            // Ports & toggles already saved via onChange
            saveConfig(cfg);
            document.getElementById('display-home-ip').textContent = cfg.homeIp;
            document.getElementById('display-public-ip').textContent = cfg.publicIp;
            renderCards();
            closeSettings();
        }

        function resetAll() {
            if (confirm('Wirklich ALLE Einstellungen zurücksetzen?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // ===== INIT =====
        function showApp() {
            const cfg = getConfig();
            document.getElementById('display-home-ip').textContent = cfg.homeIp;
            document.getElementById('display-public-ip').textContent = cfg.publicIp || cfg.homeIp;
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            renderCards();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cfg = getConfig();
            if (cfg.setupDone) {
                showApp();
            }
        });

        // Close modal on overlay click
        document.getElementById('settings-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });
    </script>
</body>
</html>
