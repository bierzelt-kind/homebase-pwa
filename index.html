<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0c29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HomeBase</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header { text-align: center; margin-bottom: 25px; }
        h1 {
            font-size: 1.8rem; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(to right, #00f2ff, #bc13fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .greeting { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }
        .switch-wrapper {
            background: rgba(0, 0, 0, 0.3); border-radius: 50px; padding: 5px;
            display: flex; position: relative; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); width: 100%; max-width: 320px;
        }
        .switch-btn {
            flex: 1; text-align: center; padding: 12px; z-index: 2;
            cursor: pointer; font-size: 0.9rem; font-weight: 500;
            transition: color 0.3s; color: rgba(255,255,255,0.6);
        }
        .switch-btn.active { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .switch-bg {
            position: absolute; top: 5px; left: 5px;
            width: calc(50% - 5px); height: calc(100% - 10px);
            background: linear-gradient(90deg, #bc13fe, #00f2ff);
            border-radius: 50px; transition: transform 0.3s;
            z-index: 1; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; }
        .card {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; color: white; position: relative;
            transition: transform 0.1s, background 0.2s; height: 130px;
        }
        .card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.15); }
        .icon-box { font-size: 2.5rem; margin-bottom: 8px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        .card span { font-weight: 600; font-size: 1rem; }
        .card small { font-size: 0.75rem; opacity: 0.6; margin-top: 2px; }
        .status-dot {
            position: absolute; top: 15px; right: 15px;
            width: 8px; height: 8px; background-color: #00ff88;
            border-radius: 50%; box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }
        .settings { margin-top: 30px; width: 100%; max-width: 600px; }
        .settings details { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; }
        .settings summary { cursor: pointer; font-weight: 500; }
        .settings input {
            padding: 10px; border-radius: 8px; border: none; width: 100%;
            margin-bottom: 10px; background: rgba(255,255,255,0.9); color: #333;
        }
        .settings button {
            padding: 10px 20px; border-radius: 8px; border: none;
            background: linear-gradient(90deg, #bc13fe, #00f2ff);
            color: white; font-weight: 600; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="title">HOME SERVER</h1>
        <div class="greeting" id="msg">System bereit.</div>
    </header>
    
    <div class="switch-wrapper">
        <div class="switch-bg" id="bg"></div>
        <div class="switch-btn active" id="btn-l" onclick="mode('local')">📶 Lokal</div>
        <div class="switch-btn" id="btn-r" onclick="mode('vpn')">🌍 VPN</div>
    </div>
    
    <div class="grid">
        <a href="#" class="card" data-p="5055"><div class="status-dot"></div><div class="icon-box">🔍</div><span>Jellyseerr</span><small>Requests</small></a>
        <a href="#" class="card" data-p="8096"><div class="status-dot"></div><div class="icon-box">▶️</div><span>Jellyfin</span><small>Media Player</small></a>
        <a href="#" class="card" data-p="8080"><div class="status-dot"></div><div class="icon-box">⬇️</div><span>SABnzbd</span><small>Downloader</small></a>
        <a href="#" class="card" data-p="8989"><div class="status-dot"></div><div class="icon-box">📺</div><span>Sonarr</span><small>TV Series</small></a>
        <a href="#" class="card" data-p="7878"><div class="status-dot"></div><div class="icon-box">🎬</div><span>Radarr</span><small>Movies</small></a>
        <a href="#" class="card" data-p="61208"><div class="status-dot"></div><div class="icon-box">📊</div><span>Glances</span><small>System Info</small></a>
    </div>
    
    <div class="settings">
        <details>
            <summary>⚙️ Einstellungen</summary>
            <div style="margin-top: 15px;">
                <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9rem;">Lokale IP:</p>
                <input type="text" id="ip-l" value="192.168.0.76">
                <p style="margin-bottom: 5px; opacity: 0.8; font-size: 0.9rem;">Tailscale IP:</p>
                <input type="text" id="ip-r" value="100.86.200.106">
                <button onclick="save()">💾 Speichern</button>
            </div>
        </details>
    </div>
    
    <script>
        let ipLocal = localStorage.getItem('ip_l') || '192.168.0.76';
        let ipRemote = localStorage.getItem('ip_r') || '100.86.200.106';
        let currentIp = ipLocal;
        let curMode = 'local';
        
        document.getElementById('ip-l').value = ipLocal;
        document.getElementById('ip-r').value = ipRemote;
        
        function updateLinks() {
            document.querySelectorAll('.card').forEach(c => {
                c.href = 'http://' + currentIp + ':' + c.dataset.p;
            });
        }
        
        function mode(m) {
            const bl = document.getElementById('btn-l');
            const br = document.getElementById('btn-r');
            const bg = document.getElementById('bg');
            
            if (m === 'local') {
                currentIp = ipLocal; curMode = 'local';
                bl.classList.add('active'); br.classList.remove('active');
                bg.style.transform = 'translateX(0)';
            } else {
                currentIp = ipRemote; curMode = 'vpn';
                br.classList.add('active'); bl.classList.remove('active');
                bg.style.transform = 'translateX(100%)';
            }
            updateLinks();
        }
        
        function save() {
            ipLocal = document.getElementById('ip-l').value || '192.168.0.76';
            ipRemote = document.getElementById('ip-r').value || '100.86.200.106';
            localStorage.setItem('ip_l', ipLocal);
            localStorage.setItem('ip_r', ipRemote);
            currentIp = curMode === 'local' ? ipLocal : ipRemote;
            updateLinks();
        }
        
        function greet() {
            const h = new Date().getHours();
            const t = document.getElementById('title');
            const m = document.getElementById('msg');
            if (h < 12) { t.innerText = 'GUTEN MORGEN'; m.innerText = 'Systeme laufen stabil.'; }
            else if (h < 18) { t.innerText = 'HALLO Bierzeltkind'; m.innerText = 'Willkommen zurueck.'; }
            else { t.innerText = 'GUTEN ABEND'; m.innerText = 'Zeit fuer einen Film?'; }
        }
        
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
        
        mode('local');
        greet();
    </script>
</body>
</html>
