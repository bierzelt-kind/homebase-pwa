<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0c29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HomeBase v2</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg1: #0f0c29; --bg2: #302b63; --bg3: #24243e; --bg4: #1a1a2e;
            --accent1: #00f2ff; --accent2: #bc13fe;
            --card-bg: rgba(255,255,255,0.07); --card-border: rgba(255,255,255,0.1);
            --text: #fff; --text-dim: rgba(255,255,255,0.6);
        }
        .light {
            --bg1: #e8eaf6; --bg2: #c5cae9; --bg3: #e8eaf6; --bg4: #f5f5f5;
            --card-bg: rgba(255,255,255,0.8); --card-border: rgba(0,0,0,0.1);
            --text: #1a1a2e; --text-dim: rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            padding: 15px;
            background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        header { text-align: center; margin-bottom: 15px; width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { flex: 1; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent1), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .greeting { font-size: 0.85rem; opacity: 0.8; margin-top: 3px; }
        .theme-toggle { font-size: 1.5rem; cursor: pointer; padding: 8px; background: var(--card-bg); border-radius: 50%; border: 1px solid var(--card-border); }
        .switch-wrapper {
            background: rgba(0,0,0,0.3); border-radius: 50px; padding: 4px;
            display: flex; position: relative; margin-bottom: 20px;
            border: 1px solid var(--card-border); backdrop-filter: blur(10px);
            width: 100%; max-width: 320px;
        }
        .switch-btn { flex: 1; text-align: center; padding: 10px; z-index: 2; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: color 0.3s; color: var(--text-dim); }
        .switch-btn.active { color: var(--text); text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .switch-bg { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px);
            background: linear-gradient(90deg, var(--accent2), var(--accent1)); border-radius: 50px;
            transition: transform 0.3s; z-index: 1; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        .stats-bar { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 600px; justify-content: center; flex-wrap: wrap; }
        .stat { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 8px 14px; font-size: 0.75rem; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 5px; }
        .stat .dot { width: 6px; height: 6px; border-radius: 50%; }
        .stat .dot.green { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .stat .dot.red { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 600px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--card-border); border-radius: 16px;
            padding: 16px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none; color: var(--text); position: relative;
            transition: transform 0.1s, background 0.2s; height: 120px;
        }
        .card:active { transform: scale(0.96); }
        .icon-box { font-size: 2rem; margin-bottom: 6px; }
        .card span { font-weight: 600; font-size: 0.9rem; }
        .card small { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
        .status-dot { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.up { background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: pulse 2s infinite; }
        .status-dot.down { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .status-dot.checking { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; animation: blink 1s infinite; }
        @keyframes pulse { 0%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(0,255,136,0.7)} 70%{transform:scale(1);box-shadow:0 0 0 6px rgba(0,255,136,0)} 100%{transform:scale(0.95)} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .settings { margin-top: 25px; width: 100%; max-width: 600px; margin-bottom: 20px; }
        .settings details { background: var(--card-bg); border-radius: 12px; padding: 12px; border: 1px solid var(--card-border); }
        .settings summary { cursor: pointer; font-weight: 500; font-size: 0.9rem; }
        .settings input { padding: 10px; border-radius: 8px; border: none; width: 100%; margin-bottom: 8px; background: rgba(255,255,255,0.9); color: #333; font-size: 0.9rem; }
        .settings button { padding: 10px 20px; border-radius: 8px; border: none; background: linear-gradient(90deg, var(--accent2), var(--accent1)); color: white; font-weight: 600; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .footer { margin-top: auto; padding: 15px; text-align: center; font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1 id="title">HOME SERVER</h1>
            <div class="greeting" id="msg">System bereit.</div>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
    </header>
    
    <div class="switch-wrapper">
        <div class="switch-bg" id="bg"></div>
        <div class="switch-btn active" id="btn-l" onclick="mode('local')">📶 Lokal</div>
        <div class="switch-btn" id="btn-r" onclick="mode('vpn')">🌍 VPN</div>
    </div>
    
    <div class="stats-bar">
        <div class="stat"><div class="dot green" id="stat-online"></div><span id="stat-text">Checking...</span></div>
    </div>
    
    <div class="grid" id="service-grid"></div>
    
    <div class="settings">
        <details>
            <summary>⚙️ Einstellungen</summary>
            <div style="margin-top: 12px;">
                <p style="margin-bottom: 4px; opacity: 0.8; font-size: 0.85rem;">Lokale IP:</p>
                <input type="text" id="ip-l" placeholder="192.168.x.x">
                <p style="margin-bottom: 4px; opacity: 0.8; font-size: 0.85rem;">Tailscale IP:</p>
                <input type="text" id="ip-r" placeholder="100.x.x.x">
                <button onclick="saveSettings()">💾 Speichern</button>
            </div>
        </details>
    </div>
    
    <div class="footer">HomeBase v2.0 | <span id="last-check">Noch nie</span></div>
    
    <script>
        const SERVICES = [
            { id: 'jellyseerr', name: 'Jellyseerr', icon: '🔍', port: 5055, desc: 'Requests' },
            { id: 'jellyfin',  name: 'Jellyfin',  icon: '▶️',  port: 8096, desc: 'Media Player' },
            { id: 'sabnzbd',   name: 'SABnzbd',   icon: '⬇️',  port: 8080, desc: 'Downloader' },
            { id: 'sonarr',    name: 'Sonarr',     icon: '📺',  port: 8989, desc: 'TV Series' },
            { id: 'radarr',    name: 'Radarr',     icon: '🎬',  port: 7878, desc: 'Movies' },
            { id: 'glances',   name: 'Glances',    icon: '📊',  port: 61208,desc: 'System Info' },
            { id: 'portainer', name: 'Portainer',  icon: '🐳',  port: 9000, desc: 'Docker' },
            { id: 'traefik',   name: 'Traefik',    icon: '🌐',  port: 8081, desc: 'Reverse Proxy' },
        ];
        
        let ipLocal = localStorage.getItem('ip_l') || '192.168.0.76';
        let ipRemote = localStorage.getItem('ip_r') || '100.86.200.106';
        let currentIp = ipLocal;
        let curMode = 'local';
        let lightMode = localStorage.getItem('light') === 'true';
        
        // Init
        document.getElementById('ip-l').value = ipLocal;
        document.getElementById('ip-r').value = ipRemote;
        if (lightMode) document.body.classList.add('light');
        
        // Render cards
        function renderCards() {
            const grid = document.getElementById('service-grid');
            grid.innerHTML = SERVICES.map(s => `
                <a href="http://${currentIp}:${s.port}" class="card" id="card-${s.id}">
                    <div class="status-dot checking" id="dot-${s.id}"></div>
                    <div class="icon-box">${s.icon}</div>
                    <span>${s.name}</span>
                    <small>${s.desc}</small>
                </a>
            `).join('');
        }
        
        // Check service status
        async function checkStatus() {
            let online = 0;
            const total = SERVICES.length;
            
            for (const s of SERVICES) {
                const dot = document.getElementById(`dot-${s.id}`);
                dot.className = 'status-dot checking';
                
                try {
                    const ctrl = new AbortController();
                    const timeout = setTimeout(() => ctrl.abort(), 3000);
                    await fetch(`http://${currentIp}:${s.port}`, { mode: 'no-cors', signal: ctrl.signal });
                    clearTimeout(timeout);
                    dot.className = 'status-dot up';
                    online++;
                } catch {
                    dot.className = 'status-dot down';
                }
            }
            
            const statDot = document.getElementById('stat-online');
            const statText = document.getElementById('stat-text');
            statDot.className = `dot ${online > 0 ? 'green' : 'red'}`;
            statText.textContent = `${online}/${total} Online`;
            document.getElementById('last-check').textContent = new Date().toLocaleTimeString('de-DE');
        }
        
        // Mode switch
        function mode(m) {
            const bl = document.getElementById('btn-l');
            const br = document.getElementById('btn-r');
            const bg = document.getElementById('bg');
            
            if (m === 'local') {
                currentIp = ipLocal; curMode = 'local';
                bl.classList.add('active'); br.classList.remove('active');
                bg.style.transform = 'translateX(0)';
            } else {
                currentIp = ipRemote; curMode = 'vpn';
                br.classList.add('active'); bl.classList.remove('active');
                bg.style.transform = 'translateX(100%)';
            }
            renderCards();
            checkStatus();
        }
        
        // Theme toggle
        function toggleTheme() {
            lightMode = !lightMode;
            document.body.classList.toggle('light');
            localStorage.setItem('light', lightMode);
        }
        
        // Settings
        function saveSettings() {
            ipLocal = document.getElementById('ip-l').value || ipLocal;
            ipRemote = document.getElementById('ip-r').value || ipRemote;
            localStorage.setItem('ip_l', ipLocal);
            localStorage.setItem('ip_r', ipRemote);
            currentIp = curMode === 'local' ? ipLocal : ipRemote;
            renderCards();
            checkStatus();
        }
        
        // Greeting
        function greet() {
            const h = new Date().getHours();
            const t = document.getElementById('title');
            const m = document.getElementById('msg');
            if (h < 12)      { t.textContent = 'GUTEN MORGEN'; m.textContent = '☕ Systeme laufen stabil.'; }
            else if (h < 18) { t.textContent = 'WILLKOMMEN'; m.textContent = '🎬 Zeit fuer was zu schauen?'; }
            else             { t.textContent = 'GUTEN ABEND'; m.textContent = '🌙 Genieß den Abend!'; }
        }
        
        // Service Worker
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        
        renderCards();
        mode('local');
        greet();
        checkStatus();
        setInterval(checkStatus, 60000); // Re-check every minute
    </script>
</body>
</html>
