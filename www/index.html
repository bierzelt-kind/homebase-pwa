<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>HomeBase</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
        :root { --bg:#0d1117; --fg:#e6edf3; --card:#161b22; --accent:#58a6ff; --border:#30363d; --mono: 'SF Mono', 'Fira Code', monospace; }
        .safe-top { height: env(safe-area-inset-top, 20px); }
        .header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 22px; font-weight: 700; }
        .logo { font-size: 28px; }
        .url-section { padding: 0 20px; margin-bottom: 8px; }
        .url-bar { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; gap: 8px; }
        .url-bar label { font-size: 11px; opacity: .5; text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
        .url-bar input { flex: 1; background: transparent; border: none; color: var(--fg); font-family: var(--mono); font-size: 14px; outline: none; }
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-top: 8px; }
        .section-header h2 { font-size: 15px; font-weight: 600; opacity: .7; text-transform: uppercase; letter-spacing: .5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 20px; }
        .service-card { background: var(--card); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; cursor: pointer; transition: .15s; }
        .service-card:active { transform: scale(.97); }
        .service-name { font-size: 14px; font-weight: 600; }
        .service-url { font-size: 12px; opacity: .5; font-family: var(--mono); }
        .safe-bottom { height: max(env(safe-area-inset-bottom, 16px), 16px); }
    </style>
</head>
<body>
    <div class="safe-top"></div>
    <div class="header">
        <h1>🏠 HomeBase</h1>
        <span class="logo">🐬</span>
    </div>
    <div class="url-section">
        <div class="url-bar">
            <label>IP</label>
            <input type="text" id="ip-input" placeholder="192.168.2.42" inputmode="decimal">
        </div>
    </div>
    <div class="section-header">
        <h2>Services</h2>
    </div>
    <div class="grid" id="grid"></div>
    <div class="safe-bottom"></div>
    <script>
        const services = [
            { id: 'ha',       name: 'HomeAssistant', port: 8123,  icon: '🏠', color: '#41bdf5' },
            { id: 'adguard',  name: 'AdGuard',       port: 3000,  icon: '🛡️', color: '#67b279' },
            { id: 'openwrt',  name: 'OpenWrt',       port: 80,    icon: '📡', color: '#00b5e2' },
            { id: 'uptime',   name: 'UptimeKuma',    port: 3001,  icon: '📊', color: '#5cdd8b' },
            { id: 'nextcloud',name: 'Nextcloud',     port: 443,   icon: '☁️', color: '#0082c9' },
            { id: 'plex',     name: 'Plex',          port: 32400, icon: '🎬', color: '#e5a00d' },
        ];

        function loadIp() { return localStorage.getItem('hb-ip') || '192.168.2.42'; }
        function saveIp(ip) { localStorage.setItem('hb-ip', ip); }

        function openService(s) {
            const ip = loadIp();
            const proto = s.port === 443 ? 'https' : 'http';
            window.open(`${proto}://${ip}:${s.port}`, '_blank');
        }

        function renderCards() {
            const ip = loadIp();
            document.getElementById('ip-input').value = ip;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            services.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.style.borderLeft = `4px solid ${s.color}`;
                card.innerHTML = `
                    <div class="service-info">
                        <div class="service-name">${s.icon} ${s.name}</div>
                        <div class="service-url">${ip}:${s.port}</div>
                    </div>`;
                card.onclick = () => openService(s);
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCards();
            document.getElementById('ip-input').addEventListener('change', e => {
                saveIp(e.target.value.trim());
                renderCards();
            });
        });
    </script>
</body>
</html>
