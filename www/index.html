<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>LanDash</title>
    <style>
        :root { --orange: #ff9000; --dark: #000; --card: #111; --border: #2a2a2a; --danger: #e74c3c; --text: #fff; --text-dim: #888; --radius: 14px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: var(--text); min-height: 100vh; min-height: 100dvh; overflow-x: hidden; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
        button { font-family: inherit; }
        input { font-family: inherit; }

        /* ===== ONBOARDING ===== */
        #onboarding { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; padding: 32px 24px; text-align: center; }
        .setup-logo { font-size: 64px; margin-bottom: 12px; }
        .setup-title { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
        .setup-title span { color: var(--orange); }
        .setup-sub { color: var(--text-dim); margin-bottom: 40px; font-size: 16px; }
        .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; }
        .setup-card h3 { margin-bottom: 16px; font-size: 18px; }
        .setup-card label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; margin-top: 14px; }
        .setup-card input { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 15px; outline: none; }
        .setup-card input:focus { border-color: var(--orange); }
        .btn-primary { display: block; width: 100%; margin-top: 24px; padding: 14px; background: var(--orange); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-primary:active { opacity: 0.85; }

        /* ===== APP SHELL ===== */
        #app { display: none; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; position: sticky; top: 0; z-index: 50; background: rgba(0,0,0,.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; font-weight: 800; }
        .header h1 span { color: var(--orange); }
        .header-actions { display: flex; gap: 8px; }
        .header-actions button { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .header-actions button:active { background: #222; }
        .header-actions button.active-delete { border-color: var(--danger); color: var(--danger); }

        /* ===== MODE SWITCH ===== */
        .mode-bar { display: flex; gap: 8px; padding: 10px 16px; }
        .mode-bar button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: var(--text-dim); font-size: 14px; font-weight: 600; cursor: pointer; }
        .mode-bar button.active { background: var(--orange); color: #000; border-color: var(--orange); }

        /* ===== IP DISPLAY ===== */
        .ip-bar { padding: 4px 16px 8px; font-size: 12px; color: var(--text-dim); font-family: monospace; }

        /* ===== SERVICE GRID ===== */
        .grid { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 8px 16px 100px; }
        @media (min-width: 500px) { .grid { grid-template-columns: 1fr 1fr; } }
        .card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: transform .1s, background .15s; border-left: 4px solid var(--orange); user-select: none; -webkit-user-select: none; }
        .card:active { transform: scale(0.97); background: #1a1a1a; }
        .card-icon { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }
        .card-img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        .card-info { flex: 1; min-width: 0; }
        .card-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-url { font-size: 12px; color: var(--text-dim); font-family: monospace; margin-top: 2px; }
        .card-status { width: 10px; height: 10px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .delete-mode .card { border-left-color: var(--danger); }
        .delete-mode .card:active { background: rgba(231,76,60,0.15); }

        /* ===== OVERLAY (Modal) ===== */
        .overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; }
        .overlay.show { display: flex; }
        .modal { background: #111; border: 1px solid var(--border); border-bottom: none; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 24px 20px 32px; }
        .modal-handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 20px; }
        .modal h2 { font-size: 20px; margin-bottom: 20px; }

        /* ===== FORM ELEMENTS ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: var(--orange); }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .proto-btns { display: flex; gap: 8px; }
        .proto-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; cursor: pointer; text-align: center; }
        .proto-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

        /* ===== ICON/ COLOR PICKERS ===== */
        .icon-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .icon-opt { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 10px; border: 2px solid transparent; background: #1a1a1a; cursor: pointer; }
        .icon-opt.selected { border-color: var(--orange); background: #222; }
        .color-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .color-opt { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .color-opt.selected { border-color: #fff; transform: scale(1.15); }

        /* ===== BUTTONS ===== */
        .btn-save { width: 100%; padding: 14px; background: var(--orange); color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn-save:active { opacity: 0.85; }
        .btn-danger { width: 100%; padding: 12px; background: transparent; color: var(--danger); border: 1px solid var(--danger); border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 12px; }
        .btn-secondary { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }

        /* ===== SETTINGS SERVICE LIST ===== */
        .settings-list { margin-top: 16px; }
        .settings-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .settings-item .srv-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
        .settings-item .srv-name { flex: 1; font-size: 14px; font-weight: 600; }
        .settings-item .port-input { width: 70px; padding: 6px 8px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; text-align: center; outline: none; }
        .settings-item .port-input:focus { border-color: var(--orange); }

        /* ===== TOGGLE SWITCH ===== */
        .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .track { position: absolute; inset: 0; background: #333; border-radius: 24px; transition: background .2s; cursor: pointer; }
        .toggle input:checked + .track { background: var(--orange); }
        .toggle .track::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform .2s; }
        .toggle input:checked + .track::after { transform: translateX(20px); }

        /* ===== QUICK-ADD ===== */
        .quick-add-title { font-size: 14px; font-weight: 700; margin-top: 24px; margin-bottom: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .quick-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 6px; cursor: pointer; text-align: center; color: var(--text); font-size: 12px; }
        .quick-btn:active { background: #252525; border-color: var(--orange); }
        .quick-btn .qi { font-size: 22px; display: block; margin-bottom: 4px; }
        .quick-btn .qn { font-weight: 600; }
        .quick-btn .qp { color: var(--text-dim); font-size: 10px; }

        /* ===== FAB ===== */
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 16px; background: var(--orange); color: #000; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,144,0,.35); z-index: 40; display: flex; align-items: center; justify-content: center; }
        .fab:active { transform: scale(0.92); }

        /* ===== IMAGE UPLOAD ===== */
        .image-upload-area { border: 2px dashed #333; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; margin-top: 8px; }
        .image-upload-area:hover { border-color: var(--orange); }
        .image-preview { display: none; align-items: center; gap: 10px; margin-top: 8px; padding: 8px; background: #1a1a1a; border-radius: 10px; }
        .image-preview img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
        .image-preview .remove-img { margin-left: auto; color: var(--danger); cursor: pointer; font-size: 18px; padding: 4px 8px; }

        /* ===== TUTORIAL ===== */
        #tutorial-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.88); align-items: center; justify-content: center; }
        #tutorial-overlay.show { display: flex; }
        .tutorial-card { background: #111; border: 2px solid var(--orange); border-radius: 20px; padding: 32px 24px; width: 90%; max-width: 360px; text-align: center; position: relative; }
        .tutorial-step-indicator { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
        .tutorial-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .tutorial-dot.active { background: var(--orange); width: 20px; border-radius: 4px; }
        .tutorial-icon { font-size: 56px; margin-bottom: 16px; }
        .tutorial-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .tutorial-text { color: var(--text-dim); font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        .tutorial-btn { padding: 12px 32px; background: var(--orange); color: #000; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .tutorial-btn:active { opacity: 0.85; }
        .tutorial-skip { display: block; margin-top: 12px; background: none; border: none; color: var(--text-dim); font-size: 13px; cursor: pointer; }
        .tutorial-highlight { position: fixed; z-index: 199; border: 3px solid var(--orange); border-radius: 18px; pointer-events: none; animation: tut-pulse 1.5s ease-in-out infinite; }
        @keyframes tut-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,144,0,.4); } 50% { box-shadow: 0 0 0 12px rgba(255,144,0,0); } }
    </style>
</head>
<body>

<!-- ===== ONBOARDING ===== -->
<div id="onboarding">
    <div class="setup-logo">🌐</div>
    <div class="setup-title">Lan<span>Dash</span></div>
    <div class="setup-sub">Dein Server-Dashboard. Immer im Griff.</div>
    <div class="setup-card">
        <h3>⚙️ Ersteinrichtung</h3>
        <label>🏠 Home IP / Hostname</label>
        <input type="text" id="setup-home-ip" placeholder="z.B. 192.168.1.100" autocomplete="off" autocapitalize="off">
        <label>🌍 Öffentliche IP / Domain</label>
        <input type="text" id="setup-public-ip" placeholder="z.B. home.example.com" autocomplete="off" autocapitalize="off">
        <button class="btn-primary" onclick="finishSetup()">🚀 Los geht's!</button>
    </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
    <!-- Header -->
    <div class="header">
        <h1>🌐 Lan<span>Dash</span></h1>
        <div class="header-actions">
            <button id="delete-mode-btn" onclick="toggleDeleteMode()" title="Services löschen">🗑️</button>
            <button id="settings-btn" onclick="openSettings()" title="Einstellungen">⚙️</button>
        </div>
    </div>

    <!-- Mode Switch -->
    <div class="mode-bar">
        <button id="btn-home" class="active" onclick="switchMode('home')">🏠 Home</button>
        <button id="btn-public" onclick="switchMode('public')">🌍 Öffentlich</button>
    </div>

    <!-- IP Display -->
    <div class="ip-bar" id="ip-display">IP: ---</div>

    <!-- Service Grid -->
    <div class="grid" id="grid"></div>

    <!-- FAB -->
    <button class="fab" onclick="openAddService()" title="Service hinzufügen">+</button>
</div>

<!-- ===== ADD SERVICE MODAL ===== -->
<div class="overlay" id="add-overlay" onclick="if(event.target===this)closeAddService()">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>➕ Service hinzufügen</h2>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="add-name" placeholder="z.B. Home Assistant">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Protokoll</label>
                <div class="proto-btns">
                    <div class="proto-btn active" id="proto-http" onclick="setProto('http')">HTTP</div>
                    <div class="proto-btn" id="proto-https" onclick="setProto('https')">HTTPS</div>
                </div>
            </div>
            <div class="form-group">
                <label>Port</label>
                <input type="number" id="add-port" placeholder="8080" min="1" max="65535">
            </div>
        </div>
        <div class="form-group">
            <label>Icon</label>
            <div class="icon-grid" id="icon-grid"></div>
        </div>
        <div class="form-group">
            <label>Farbe</label>
            <div class="color-row" id="color-row"></div>
        </div>
        <div class="form-group">
            <label>Bild (optional)</label>
            <div class="image-upload-area" onclick="document.getElementById('add-image').click()">
                📷 Bild hochladen
            </div>
            <input type="file" id="add-image" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
            <div class="image-preview" id="image-preview">
                <img id="preview-img" src="" alt="">
                <span>Bild gewählt</span>
                <span class="remove-img" onclick="removeImage()">✕</span>
            </div>
        </div>
        <button class="btn-save" onclick="addNewService()">✅ Hinzufügen</button>
    </div>
</div>

<!-- ===== TUTORIAL ===== -->
<div id="tutorial-overlay">
    <div class="tutorial-card">
        <div class="tutorial-step-indicator" id="tutorial-dots"></div>
        <div class="tutorial-icon" id="tut-icon"></div>
        <div class="tutorial-title" id="tut-title"></div>
        <div class="tutorial-text" id="tut-text"></div>
        <button class="tutorial-btn" id="tut-btn" onclick="tutorialNext()">Weiter →</button>
        <button class="tutorial-skip" onclick="tutorialSkip()">Überspringen</button>
    </div>
</div>
<div class="tutorial-highlight" id="tut-highlight" style="display:none;"></div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>⚙️ Einstellungen</h2>
        <div class="form-group">
            <label>🏠 Home IP / Hostname</label>
            <input type="text" id="set-home-ip" autocomplete="off" autocapitalize="off">
        </div>
        <div class="form-group">
            <label>🌍 Öffentliche IP / Domain</label>
            <input type="text" id="set-public-ip" autocomplete="off" autocapitalize="off">
        </div>
        <button class="btn-save" onclick="saveSettings()">💾 Speichern</button>

        <div class="quick-add-title">Services verwalten</div>
        <div class="settings-list" id="settings-services"></div>

        <button class="btn-secondary" onclick="openAddServiceFromSettings()">➕ Neuer Service</button>

        <div class="quick-add-title">Schnell hinzufügen</div>
        <div class="quick-grid" id="quick-add-grid"></div>

        <button class="btn-danger" onclick="resetAll()">⚠️ Alles zurücksetzen</button>
    </div>
</div>

<script>
// ===== ICONS & COLORS =====
const ICONS = ['🏠','🛡️','📡','📊','☁️','🎬','🎮','💾','🖥️','📹','🔔','💡','🌡️','🔒','🔑','📁','🖨️','⚡','🌐','📧','💬','🎵','📺','🎯','🧪','🔬','🤖','🛠️','📦','⏰','🔋','🗺️'];
const COLORS = ['#41bdf5','#67b279','#00b5e2','#5cdd8b','#0082c9','#ff9000','#e74c3c','#9b59b6','#f39c12','#1abc9c','#e91e63','#3f51b5','#ff5722','#607d8b','#795548','#009688'];
const DEFAULT_SERVICES = [
    { id:'ha', name:'Home Assistant', port:8123, icon:'🏠', color:'#41bdf5', enabled:true, proto:'http' },
    { id:'adguard', name:'AdGuard', port:3000, icon:'🛡️', color:'#67b279', enabled:true, proto:'http' },
    { id:'openwrt', name:'OpenWrt', port:80, icon:'📡', color:'#00b5e2', enabled:true, proto:'http' },
    { id:'uptime', name:'Uptime Kuma', port:3001, icon:'📊', color:'#5cdd8b', enabled:true, proto:'http' },
    { id:'nextcloud', name:'Nextcloud', port:443, icon:'☁️', color:'#0082c9', enabled:true, proto:'https' },
    { id:'jellyhub', name:'JellyHub', port:8096, icon:'🎬', color:'#ff9000', enabled:true, proto:'http' },
];
const QUICK_ADD = [
    { label:'Home Assistant', icon:'🏠', port:8123, color:'#41bdf5' },
    { label:'Plex', icon:'🎬', port:32400, color:'#e5a00d' },
    { label:'Jellyfin', icon:'🎞️', port:8096, color:'#00a4dc' },
    { label:'Emby', icon:'🎞️', port:8920, color:'#52b54b' },
    { label:'Sonarr', icon:'📺', port:8989, color:'#2980b9' },
    { label:'Radarr', icon:'🎥', port:7878, color:'#ffc107' },
    { label:'Overseerr', icon:'📋', port:5055, color:'#1c3f5a' },
    { label:'NZBGet', icon:'📦', port:6789, color:'#2196f3' },
    { label:'Transmission', icon:'⬇️', port:9091, color:'#d70607' },
    { label:'Grafana', icon:'📈', port:3000, color:'#f46800' },
    { label:'Traefik', icon:'🔀', port:8080, color:'#24b4f0' },
    { label:'Prometheus', icon:'📊', port:9090, color:'#e6522c' },
    { label:'Node-RED', icon:'🔴', port:1880, color:'#8f0000' },
    { label:'Pi-hole', icon:'🕳️', port:80, color:'#96060c' },
    { label:'Bitwarden', icon:'🔑', port:80, color:'#175ddc' },
    { label:'WireGuard', icon:'🔐', port:51820, color:'#88171a' },
];

// ===== STATE =====
let currentMode = 'home';
let deleteMode = false;
let selectedIcon = '🏠';
let selectedColor = '#ff9000';
let newProto = 'http';
let newImage = null;

// ===== CONFIG =====
function getConfig() {
    return {
        homeIp: localStorage.getItem('hd-home-ip') || '',
        publicIp: localStorage.getItem('hd-public-ip') || '',
        setupDone: localStorage.getItem('hd-setup-done') === 'true',
        services: JSON.parse(localStorage.getItem('hd-services') || 'null') || DEFAULT_SERVICES.slice()
    };
}
function saveConfig(cfg) {
    localStorage.setItem('hd-home-ip', cfg.homeIp);
    localStorage.setItem('hd-public-ip', cfg.publicIp);
    localStorage.setItem('hd-setup-done', 'true');
    localStorage.setItem('hd-services', JSON.stringify(cfg.services));
}
function getActiveIp() {
    const cfg = getConfig();
    return currentMode === 'home' ? cfg.homeIp : cfg.publicIp;
}

// ===== HELPERS =====
function serviceUrl(s) {
    const ip = getActiveIp();
    if (!ip) return '#';
    // Support both new format (port+proto) and legacy format (url)
    if (s.port) {
        const proto = s.proto || (s.port === 443 ? 'https' : 'http');
        return `${proto}://${ip}:${s.port}`;
    }
    if (s.url) {
        // Legacy: replace stored IP with current IP
        try {
            const u = new URL(s.url);
            return `${u.protocol}//${ip}:${u.port || 80}`;
        } catch(e) { return s.url; }
    }
    return '#';
}

// ===== ONBOARDING =====
function finishSetup() {
    const homeIp = document.getElementById('setup-home-ip').value.trim();
    const publicIp = document.getElementById('setup-public-ip').value.trim();
    if (!homeIp) { alert('Bitte Home IP eingeben!'); return; }
    const cfg = getConfig();
    cfg.homeIp = homeIp;
    cfg.publicIp = publicIp || homeIp;
    cfg.setupDone = true;
    saveConfig(cfg);
    showApp();
}

// ===== MODE SWITCH =====
function switchMode(mode) {
    currentMode = mode;
    document.getElementById('btn-home').className = mode === 'home' ? 'active' : '';
    document.getElementById('btn-public').className = mode === 'public' ? 'active' : '';
    renderCards();
}

// ===== RENDER CARDS =====
function renderCards() {
    const cfg = getConfig();
    const ip = getActiveIp();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const enabled = cfg.services.filter(s => s.enabled !== false);

    document.getElementById('ip-display').textContent = ip ? `IP: ${ip}` : '⚠️ Keine IP konfiguriert';

    enabled.forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        if (s.color) card.style.borderLeftColor = s.color;

        const url = serviceUrl(s);
        const portDisplay = s.port || (s.url ? (() => { try { return new URL(s.url).port || '80'; } catch(e) { return '?'; } })() : '?');
        const iconHtml = s.image
            ? `<img class="card-img" src="${s.image}" alt="">`
            : `<span class="card-icon">${s.icon || '🔌'}</span>`;

        card.innerHTML = `
            ${iconHtml}
            <div class="card-info">
                <div class="card-name">${s.name}</div>
                <div class="card-url">${ip || '---'}:${portDisplay}</div>
            </div>
            <div class="card-status"></div>`;

        card.onclick = () => {
            if (deleteMode) {
                if (confirm(`"${s.name}" löschen?`)) deleteService(s.id);
            } else {
                window.open(url, '_blank');
            }
        };
        grid.appendChild(card);
    });

    grid.className = 'grid' + (deleteMode ? ' delete-mode' : '');
}

// ===== DELETE MODE =====
function toggleDeleteMode() {
    deleteMode = !deleteMode;
    const btn = document.getElementById('delete-mode-btn');
    btn.className = deleteMode ? 'active-delete' : '';
    btn.innerHTML = deleteMode ? '✅' : '🗑️';
    renderCards();
}
function deleteService(id) {
    const cfg = getConfig();
    cfg.services = cfg.services.filter(s => s.id !== id);
    saveConfig(cfg);
    renderCards();
    renderSettingsServices();
}

// ===== ADD SERVICE =====
function openAddService() {
    if (deleteMode) toggleDeleteMode();
    selectedIcon = '🏠'; selectedColor = '#ff9000'; newProto = 'http'; newImage = null;
    document.getElementById('add-name').value = '';
    document.getElementById('add-port').value = '';
    document.getElementById('add-image').value = '';
    document.getElementById('image-preview').style.display = 'none';
    setProto('http');
    renderIconGrid();
    renderColorRow();
    document.getElementById('add-overlay').classList.add('show');
}
function closeAddService() { document.getElementById('add-overlay').classList.remove('show'); }
function setProto(p) {
    newProto = p;
    document.getElementById('proto-http').className = 'proto-btn' + (p==='http'?' active':'');
    document.getElementById('proto-https').className = 'proto-btn' + (p==='https'?' active':'');
}
function renderIconGrid() {
    const g = document.getElementById('icon-grid'); g.innerHTML = '';
    ICONS.forEach(i => {
        const d = document.createElement('div');
        d.className = 'icon-opt' + (i===selectedIcon?' selected':'');
        d.textContent = i;
        d.onclick = () => { selectedIcon = i; renderIconGrid(); };
        g.appendChild(d);
    });
}
function renderColorRow() {
    const r = document.getElementById('color-row'); r.innerHTML = '';
    COLORS.forEach(c => {
        const d = document.createElement('div');
        d.className = 'color-opt' + (c===selectedColor?' selected':'');
        d.style.background = c;
        d.onclick = () => { selectedColor = c; renderColorRow(); };
        r.appendChild(d);
    });
}
function handleImageUpload(e) {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
        newImage = ev.target.result;
        document.getElementById('preview-img').src = newImage;
        document.getElementById('image-preview').style.display = 'flex';
    };
    r.readAsDataURL(f);
}
function removeImage() {
    newImage = null;
    document.getElementById('image-preview').style.display = 'none';
    document.getElementById('add-image').value = '';
}
function addNewService() {
    const name = document.getElementById('add-name').value.trim();
    const port = parseInt(document.getElementById('add-port').value);
    if (!name) { alert('Bitte Name eingeben!'); return; }
    if (!port || port < 1 || port > 65535) { alert('Bitte gültigen Port (1-65535)!'); return; }
    const cfg = getConfig();
    const srv = { id: 'srv_'+Date.now(), name, port, icon: selectedIcon, color: selectedColor, enabled: true, proto: newProto };
    if (newImage) srv.image = newImage;
    cfg.services.push(srv);
    saveConfig(cfg);
    closeAddService();
    renderCards();
    renderSettingsServices();
}

// ===== SETTINGS =====
function openSettings() {
    const cfg = getConfig();
    document.getElementById('set-home-ip').value = cfg.homeIp;
    document.getElementById('set-public-ip').value = cfg.publicIp;
    renderSettingsServices();
    renderQuickAdd();
    document.getElementById('settings-overlay').classList.add('show');
}
function closeSettings() { document.getElementById('settings-overlay').classList.remove('show'); }
function renderSettingsServices() {
    const cfg = getConfig();
    const c = document.getElementById('settings-services');
    c.innerHTML = '';
    cfg.services.forEach((s, i) => {
        const portVal = s.port || (s.url ? parseInt(new URL(s.url).port) || 80 : 80);
        const iconHtml = s.image
            ? `<img class="card-img" src="${s.image}" style="width:24px;height:24px;border-radius:6px;">`
            : `<span class="srv-icon">${s.icon || '🔌'}</span>`;
        const div = document.createElement('div');
        div.className = 'settings-item';
        div.innerHTML = `
            <label class="toggle">
                <input type="checkbox" ${s.enabled!==false?'checked':''} data-idx="${i}" onchange="toggleService(this)">
                <span class="track"></span>
            </label>
            ${iconHtml}
            <span class="srv-name">${s.name}</span>
            <input type="number" class="port-input" value="${portVal}" data-idx="${i}" onchange="updatePort(this)" min="1" max="65535">`;
        c.appendChild(div);
    });
}
function toggleService(el) {
    const cfg = getConfig();
    cfg.services[parseInt(el.dataset.idx)].enabled = el.checked;
    saveConfig(cfg);
    renderCards();
}
function updatePort(el) {
    const cfg = getConfig();
    const idx = parseInt(el.dataset.idx);
    const val = parseInt(el.value);
    if (val >= 1 && val <= 65535) {
        cfg.services[idx].port = val;
        saveConfig(cfg);
        renderCards();
    }
}
function saveSettings() {
    const cfg = getConfig();
    cfg.homeIp = document.getElementById('set-home-ip').value.trim();
    cfg.publicIp = document.getElementById('set-public-ip').value.trim() || cfg.homeIp;
    saveConfig(cfg);
    renderCards();
    closeSettings();
}
function openAddServiceFromSettings() { closeSettings(); setTimeout(openAddService, 200); }
function resetAll() {
    if (confirm('Wirklich ALLE Einstellungen zurücksetzen?')) { localStorage.clear(); location.reload(); }
}

// ===== QUICK-ADD =====
function renderQuickAdd() {
    const grid = document.getElementById('quick-add-grid');
    if (!grid) return;
    grid.innerHTML = '';
    QUICK_ADD.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.innerHTML = `<span class="qi">${s.icon}</span><span class="qn">${s.label}</span><br><span class="qp">:${s.port}</span>`;
        btn.onclick = () => {
            const port = prompt(`Port für ${s.label}:`, s.port);
            if (!port) return;
            const p = parseInt(port);
            if (!p || p < 1 || p > 65535) { alert('Ungültiger Port!'); return; }
            const cfg = getConfig();
            cfg.services.push({
                id: 'qa_' + Date.now(),
                name: s.label,
                port: p,
                icon: s.icon,
                color: s.color,
                enabled: true,
                proto: (p === 443 || p === 8443) ? 'https' : 'http'
            });
            saveConfig(cfg);
            renderSettingsServices();
            renderCards();
        };
        grid.appendChild(btn);
    });
}

// ===== TUTORIAL =====
const TUTORIAL_STEPS = [
    {
        icon: '🏠',
        title: 'Willkommen bei LanDash!',
        text: 'Dein persönliches Dashboard für alle deine Heim-Services. Alles an einem Ort — schnell erreichbar!',
        highlight: null
    },
    {
        icon: '➕',
        title: 'Service hinzufügen',
        text: 'Tippe auf den ➕ Button unten rechts, um deinen ersten Service hinzuzufügen.',
        highlight: '.fab'
    },
    {
        icon: '⚡',
        title: 'Schnell hinzufügen',
        text: 'Oder öffne ⚙️ Einstellungen → dort findest du vordefinierte Services zum Schnellstart!',
        highlight: '#settings-btn'
    },
    {
        icon: '🏠',
        title: 'Home / Öffentlich',
        text: 'Schwische zwischen Home (Lokales Netzwerk) und Öffentlich (unterwegs) um — deine Services bleiben gleich!',
        highlight: '.mode-bar'
    }
];
let tutorialStep = 0;
function tutorialShow() {
    tutorialStep = 0;
    renderTutorialStep();
    document.getElementById('tutorial-overlay').classList.add('show');
}
function renderTutorialStep() {
    const step = TUTORIAL_STEPS[tutorialStep];
    document.getElementById('tut-icon').textContent = step.icon;
    document.getElementById('tut-title').textContent = step.title;
    document.getElementById('tut-text').textContent = step.text;
    document.getElementById('tut-btn').textContent = tutorialStep < TUTORIAL_STEPS.length - 1 ? 'Weiter →' : '🚀 Los geht\'s!';
    // Dots
    const dots = document.getElementById('tutorial-dots');
    dots.innerHTML = '';
    TUTORIAL_STEPS.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'tutorial-dot' + (i === tutorialStep ? ' active' : '');
        dots.appendChild(d);
    });
    // Highlight
    const hl = document.getElementById('tut-highlight');
    if (step.highlight) {
        const el = document.querySelector(step.highlight);
        if (el) {
            const r = el.getBoundingClientRect();
            hl.style.display = 'block';
            hl.style.left = (r.left - 6) + 'px';
            hl.style.top = (r.top - 6) + 'px';
            hl.style.width = (r.width + 12) + 'px';
            hl.style.height = (r.height + 12) + 'px';
        }
    } else {
        hl.style.display = 'none';
    }
}
function tutorialNext() {
    tutorialStep++;
    if (tutorialStep >= TUTORIAL_STEPS.length) {
        tutorialDone();
    } else {
        renderTutorialStep();
    }
}
function tutorialSkip() { tutorialDone(); }
function tutorialDone() {
    document.getElementById('tutorial-overlay').classList.remove('show');
    document.getElementById('tut-highlight').style.display = 'none';
    localStorage.setItem('hd-tutorial-done', 'true');
}
function shouldShowTutorial() {
    const cfg = getConfig();
    const tutDone = localStorage.getItem('hd-tutorial-done') === 'true';
    return cfg.setupDone && !tutDone && cfg.services.filter(s => s.enabled !== false).length === DEFAULT_SERVICES.filter(s => s.enabled !== false).length;
}

// ===== INIT =====
function showApp() {
    const cfg = getConfig();
    document.getElementById('onboarding').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderCards();
    // Show tutorial on first launch (when still has default services only)
    if (shouldShowTutorial()) {
        setTimeout(tutorialShow, 500);
    }
}
document.addEventListener('DOMContentLoaded', () => {
    const cfg = getConfig();
    if (cfg.setupDone) showApp();
});
</script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
