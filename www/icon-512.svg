<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- LAN Cable -->
  <path d="M80 200 L180 200 L180 240 L240 240 L240 200 L330 200 L330 260 L400 260 L400 312 L330 312 L330 350 L240 350 L240 312 L180 312 L180 280 L80 280 Z" fill="#ff9000" opacity="0.9"/>
  <!-- Cable inner wire -->
  <path d="M90 230 L160 230 L160 250 L240 250 L240 220 L320 220 L320 270 L390 270 L390 300 L320 300 L320 340 L240 340 L240 300 L160 300 L160 270 L90 270 Z" fill="#0a0a0a"/>
  <!-- Colored wire segments -->
  <rect x="95" y="235" width="55" height="6" rx="3" fill="#e74c3c"/>
  <rect x="95" y="245" width="55" height="6" rx="3" fill="#3498db"/>
  <rect x="95" y="255" width="55" height="6" rx="3" fill="#2ecc71"/>
  <rect x="95" y="265" width="55" height="6" rx="3" fill="#f1c40f"/>
  <!-- Wire 2 -->
  <rect x="248" y="225" width="6" height="35" rx="3" fill="#e74c3c"/>
  <rect x="258" y="225" width="6" height="35" rx="3" fill="#3498db"/>
  <rect x="268" y="225" width="6" height="35" rx="3" fill="#2ecc71"/>
  <rect x="278" y="225" width="6" height="35" rx="3" fill="#f1c40f"/>
  <!-- Wire 3 -->
  <rect x="325" y="265" width="6" height="35" rx="3" fill="#e74c3c"/>
  <rect x="335" y="265" width="6" height="35" rx="3" fill="#3498db"/>
  <rect x="345" y="265" width="6" height="35" rx="3" fill="#2ecc71"/>
  <rect x="355" y="265" width="6" height="35" rx="3" fill="#f1c40f"/>
  <!-- Wire 4 -->
  <rect x="165" y="295" width="65" height="6" rx="3" fill="#e74c3c"/>
  <rect x="165" y="305" width="65" height="6" rx="3" fill="#3498db"/>
  <rect x="165" y="315" width="65" height="6" rx="3" fill="#2ecc71"/>
  <rect x="165" y="325" width="65" height="6" rx="3" fill="#f1c40f"/>
  <!-- RJ45 plug left -->
  <rect x="60" y="195" width="30" height="90" rx="6" fill="#333" stroke="#ff9000" stroke-width="3"/>
  <rect x="65" y="205" width="20" height="70" rx="3" fill="#1a1a1a"/>
  <!-- RJ45 plug right -->
  <rect x="422" y="255" width="30" height="90" rx="6" fill="#333" stroke="#ff9000" stroke-width="3"/>
  <rect x="427" y="265" width="20" height="70" rx="3" fill="#1a1a1a"/>
  <!-- Text -->
  <text x="256" y="430" text-anchor="middle" font-family="'SF Pro Rounded','Segoe UI',sans-serif" font-size="56" font-weight="900" fill="#ff9000">LanDash</text>
  <text x="256" y="470" text-anchor="middle" font-family="'SF Pro Rounded','Segoe UI',sans-serif" font-size="22" fill="#666">Server Dashboard</text>
</svg>