<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9000"/>
      <stop offset="100%" style="stop-color:#e67e00"/>
    </linearGradient>
  </defs>
  <!-- Full background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- WiFi arcs (centered in safe zone) -->
  <g transform="translate(256,150)">
    <path d="M-60,-20 A85,85 0 0,1 60,-20" fill="none" stroke="#ff9000" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <path d="M-40,-5 A58,58 0 0,1 40,-5" fill="none" stroke="#ff9000" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <path d="M-20,10 A32,32 0 0,1 20,10" fill="none" stroke="#ff9000" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <circle cx="0" cy="25" r="6" fill="#ff9000"/>
  </g>
  <!-- House (centered) -->
  <g transform="translate(256,280)">
    <polygon points="-100,0 0,-80 100,0" fill="url(#roof)"/>
    <rect x="-75" y="0" width="150" height="120" fill="#f5f5f5" rx="4"/>
    <rect x="-18" y="50" width="36" height="70" fill="#ff9000" rx="18 18 0 0"/>
    <rect x="-60" y="20" width="35" height="30" fill="#1a1a1a" rx="4"/>
    <line x1="-42.5" y1="20" x2="-42.5" y2="50" stroke="#333" stroke-width="2"/>
    <line x1="-60" y1="35" x2="-25" y2="35" stroke="#333" stroke-width="2"/>
    <rect x="25" y="20" width="35" height="30" fill="#1a1a1a" rx="4"/>
    <line x1="42.5" y1="20" x2="42.5" y2="50" stroke="#333" stroke-width="2"/>
    <line x1="25" y1="35" x2="60" y2="35" stroke="#333" stroke-width="2"/>
  </g>
</svg>
